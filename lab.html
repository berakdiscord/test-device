<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>اختبار تصميم المختبرات - الوضع الليلي</title>
    <style>
        :root { 
            --primary: #3498db; 
            --bg: #121212; 
            --container-bg: #1e1e1e; 
            --text-main: #e0e0e0; 
            --text-sec: #b3b3b3;
            --border-color: #333333;
            --btn-bg: #2a2a2a;
            --wrong: #e74c3c; 
            --right: #2ecc71; 
            --warning: #f39c12; 
        }
        
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: var(--bg); color: var(--text-main); margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .quiz-container { background: var(--container-bg); width: 100%; max-width: 700px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); padding: 30px; position: relative; overflow: hidden; border: 1px solid #2a2a2a; }
        
        .header { border-bottom: 2px solid var(--border-color); padding-bottom: 15px; margin-bottom: 20px; display: flex; justify-content: center; align-items: center; text-align: center; }
        .header h1 { font-size: 1.6rem; color: var(--primary); margin: 0; }
        
        .setup-screen { text-align: center; padding: 20px 0; }
        .setup-screen h2 { color: var(--text-main); margin-bottom: 25px; font-weight: normal; }
        .setup-btns { display: flex; flex-direction: column; gap: 15px; max-width: 300px; margin: 0 auto; }
        .btn-setup { background: var(--container-bg); border: 2px solid var(--primary); color: var(--primary); padding: 15px; border-radius: 10px; cursor: pointer; font-size: 1.1rem; font-weight: bold; transition: 0.3s; }
        .btn-setup:hover { background: var(--primary); color: #fff; transform: translateY(-3px); box-shadow: 0 5px 15px rgba(52, 152, 219, 0.3); }

        .stats-board { display: none; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 25px; text-align: center; }
        .stat-box { background: var(--btn-bg); padding: 10px 5px; border-radius: 8px; font-weight: bold; font-size: 0.9rem; border: 1px solid var(--border-color); }
        .stat-cor { border-bottom: 3px solid var(--right); color: var(--right); }
        .stat-wro { border-bottom: 3px solid var(--wrong); color: var(--wrong); }
        .stat-rem { border-bottom: 3px solid var(--warning); color: var(--warning); }
        .stat-ans { border-bottom: 3px solid #3498db; color: #3498db; }
        .stat-box span { display: block; font-size: 1.4rem; margin-top: 5px; color: var(--text-main); }

        .question-text { font-size: 1.2rem; color: var(--text-main); margin-bottom: 25px; line-height: 1.6; font-weight: 600; text-align: left; direction: ltr; }
        .options-container { display: grid; gap: 12px; }
        .option-btn { background: var(--btn-bg); border: 2px solid var(--border-color); color: var(--text-main); padding: 15px; border-radius: 10px; cursor: pointer; text-align: left; font-size: 1rem; transition: all 0.2s; direction: ltr; }
        .option-btn:hover:not(:disabled) { border-color: var(--primary); background: #1a252c; }
        .option-btn.correct { background-color: rgba(46, 204, 113, 0.2); border-color: var(--right); color: var(--right); }
        .option-btn.incorrect { background-color: rgba(231, 76, 60, 0.2); border-color: var(--wrong); color: var(--wrong); }
        
        .skip-container { margin-top: 20px; text-align: center; }
        .btn-skip { background: transparent; border: 1px solid var(--warning); color: var(--warning); padding: 12px 25px; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 1rem; transition: 0.3s; width: 100%; }
        .btn-skip:hover:not(:disabled) { background: rgba(243, 156, 18, 0.1); }
        .btn-skip:disabled { border-color: #555; color: #555; cursor: not-allowed; }

        .footer { margin-top: 30px; display: flex; justify-content: center; border-top: 2px solid var(--border-color); padding-top: 20px;}
        .btn { padding: 10px 25px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-home { background: #333; color: var(--text-main); text-decoration: none; font-size: 0.9rem; padding: 10px 20px; display: inline-block; border-radius: 8px; transition: 0.3s; border: 1px solid #444; }
        .btn-home:hover { background: #444; color: #fff; }
        
        .result-screen { text-align: center; display: none; }
        .score { font-size: 3.5rem; font-weight: bold; color: var(--primary); margin: 20px 0; text-shadow: 0 0 10px rgba(52, 152, 219, 0.3); }
        #score-text { color: var(--text-sec); font-size: 1.1rem; }
        
        #game { display: none; }

        @media (max-width: 500px) {
            .stats-board { grid-template-columns: repeat(2, 1fr); gap: 15px; }
        }
    </style>
</head>
<body>

<div class="quiz-container" id="quiz-box">
    <div class="header">
        <h1>Laboratory Design Quiz</h1>
    </div>

    <div class="setup-screen" id="setup-screen">
        <h2>اختر عدد الأسئلة لبدء الاختبار:</h2>
        <div class="setup-btns">
            <button class="btn-setup" onclick="startQuiz(15)">اختبار قصير (15 سؤال)</button>
            <button class="btn-setup" onclick="startQuiz(30)">اختبار متوسط (30 سؤال)</button>
            <button class="btn-setup" onclick="startQuiz(50)">اختبار شامل (50 سؤال)</button>
        </div>
    </div>

    <div class="stats-board" id="stats-board">
        <div class="stat-box stat-ans">مُجاب <span id="val-ans">0</span></div>
        <div class="stat-box stat-rem">متبقي <span id="val-rem">0</span></div>
        <div class="stat-box stat-cor">صح <span id="val-cor">0</span></div>
        <div class="stat-box stat-wro">خطأ <span id="val-wro">0</span></div>
    </div>

    <div id="game">
        <div class="question-text" id="question">جاري تحميل السؤال...</div>
        <div class="options-container" id="options">
            </div>
        <div class="skip-container" id="skip-container">
            <button class="btn-skip" id="btn-skip" onclick="skipQuestion()">تخطي السؤال (تأجيل)</button>
        </div>
    </div>

    <div class="result-screen" id="result-screen">
        <h2>اكتمل الاختبار!</h2>
        <div class="score" id="final-score">0%</div>
        <p id="score-text"></p>
        <button class="btn" style="background: var(--primary); color:#121212; margin-top: 20px; margin-bottom: 10px; font-size: 1.1rem; padding: 12px 30px;" onclick="location.reload()">إعادة الاختبار</button>
    </div>

    <div class="footer">
        <a href="index.html" class="btn-home">العودة للرئيسية</a>
    </div>
</div>

<script>
// بنك الأسئلة (50 سؤال)
const allQuestions = [
    { q: "What is the main goal of good laboratory design?", a: ["Decoration", "Safety and efficiency", "Entertainment", "Marketing"], c: 1 },
    { q: "Laboratory design should consider the needs of:", a: ["Visitors only", "Scientific and operational work", "Cleaning staff only", "Security staff only"], c: 1 },
    { q: "Laboratories can be designed for:", a: ["Research only", "Diagnostics only", "Education only", "Research, diagnostics, education, or manufacturing"], c: 3 },
    { q: "Which factor must be considered when designing a laboratory?", a: ["Color of walls only", "Future technological changes", "Music system", "Advertising"], c: 1 },
    { q: "Safety in laboratory design aims to protect:", a: ["Equipment only", "Users and environment", "Buildings only", "Furniture only"], c: 1 },
    { q: "Hazardous materials must be considered in:", a: ["Laboratory decoration", "Safety protocols", "Furniture selection", "Wall painting"], c: 1 },
    { q: "Efficient workflow in laboratories helps to:", a: ["Increase unnecessary movement", "Reduce efficiency", "Improve work performance", "Slow down work"], c: 2 },
    { q: "Laboratory layout should minimize:", a: ["Work", "Movement and contamination", "Equipment use", "Lighting"], c: 1 },
    { q: "Flexibility in lab design means:", a: ["Fixed furniture only", "Modular and adaptable design", "No equipment changes", "Limited space"], c: 1 },
    { q: "Energy-efficient laboratory design aims to:", a: ["Increase power consumption", "Reduce environmental impact", "Waste energy", "Increase temperature"], c: 1 },
    { q: "Laboratories are often divided into functional:", a: ["Rooms", "Zones", "Buildings", "Floors"], c: 1 },
    { q: "Preparation areas in laboratories are used for:", a: ["Entertainment", "Experiment preparation", "Sleeping", "Storage only"], c: 1 },
    { q: "Smooth movement flow helps reduce:", a: ["Research quality", "Cross-contamination", "Lighting efficiency", "Equipment cost"], c: 1 },
    { q: "Ventilation in laboratories is important for:", a: ["Decoration", "Air quality and safety", "Noise reduction only", "Color design"], c: 1 },
    { q: "Airflow in labs helps to remove:", a: ["Furniture", "Contaminants", "Researchers", "Equipment"], c: 1 },
    { q: "Workbenches should be:", a: ["Fragile", "Decorative", "Durable and chemical-resistant", "Wooden only"], c: 2 },
    { q: "Workstations are designed for:", a: ["Entertainment", "Laboratory tasks", "Sleeping", "Meetings only"], c: 1 },
    { q: "Hazardous materials should be stored in:", a: ["Open shelves", "Locked cabinets", "Desks", "Drawers only"], c: 1 },
    { q: "Temperature-sensitive materials require:", a: ["Hot storage", "Cold storage", "Open storage", "Dry storage only"], c: 1 },
    { q: "Proper lighting in laboratories helps to:", a: ["Increase errors", "Reduce focus", "Reduce errors and improve concentration", "Increase noise"], c: 2 },
    { q: "Fume hoods are used when handling:", a: ["Water", "Chemicals", "Paper", "Books"], c: 1 },
    { q: "Biosafety cabinets are used for:", a: ["Food storage", "Handling biological materials", "Furniture storage", "Equipment repair"], c: 1 },
    { q: "Waste management systems are used for:", a: ["Decoration", "Disposal of laboratory waste", "Storing chemicals", "Air purification"], c: 1 },
    { q: "Laboratory waste may include:", a: ["Chemical waste", "Biological waste", "Radioactive waste", "All of the above"], c: 3 },
    { q: "Fire safety equipment includes:", a: ["Fire extinguishers", "Computers", "Chairs", "Lamps"], c: 0 },
    { q: "Emergency exits in laboratories should be:", a: ["Hidden", "Clearly accessible", "Locked", "Decorative"], c: 1 },
    { q: "Emergency stations may include:", a: ["Eyewash stations", "Showers", "First aid areas", "All of the above"], c: 3 },
    { q: "Biosafety levels define:", a: ["Laboratory colors", "Containment levels for biological materials", "Lighting systems", "Furniture design"], c: 1 },
    { q: "BSL stands for:", a: ["Biological Safety Layout", "Biosafety Level", "Basic Safety Lab", "Biological System Lab"], c: 1 },
    { q: "User comfort in laboratories is important because:", a: ["Labs are relaxing places", "Labs are high-stress environments", "Work is easy", "No equipment is used"], c: 1 },
    { q: "Adjustable workstations help:", a: ["Improve user comfort", "Reduce safety", "Increase contamination", "Increase noise"], c: 0 },
    { q: "Consumable furniture refers to:", a: ["Temporary furniture used in labs", "Food furniture", "Electronic furniture", "Decorative furniture"], c: 0 },
    { q: "Sustainable laboratory design focuses on:", a: ["Environmental protection", "Decoration", "High cost", "Increased waste"], c: 0 },
    { q: "Water conservation in labs can be achieved by:", a: ["High-flow fixtures", "Low-flow fixtures", "No water use", "Open pipes"], c: 1 },
    { q: "Energy-efficient equipment helps:", a: ["Increase pollution", "Reduce energy consumption", "Waste electricity", "Increase heat"], c: 1 },
    { q: "Laboratory design must consider:", a: ["Safety", "Efficiency", "Environmental impact", "All of the above"], c: 3 },
    { q: "Laboratory layout planning should focus on:", a: ["Worker movement", "Equipment placement", "Safety", "All of the above"], c: 3 },
    { q: "Poor laboratory design may lead to:", a: ["Increased safety", "Accidents and inefficiency", "Faster experiments", "Better results"], c: 1 },
    { q: "Ventilation systems help maintain:", a: ["Air pressure only", "Air quality", "Room color", "Furniture position"], c: 1 },
    { q: "Workbench materials should resist:", a: ["Water only", "Chemicals", "Air only", "Light"], c: 1 },
    { q: "Administrative spaces in labs are used for:", a: ["Experiments", "Office tasks", "Chemical storage", "Waste disposal"], c: 1 },
    { q: "Specialized equipment areas are designed for:", a: ["Large instruments", "Chairs", "Paper storage", "Lighting only"], c: 0 },
    { q: "Good laboratory design improves:", a: ["Productivity", "Safety", "Organization", "All of the above"], c: 3 },
    { q: "Laboratory airflow design mainly prevents:", a: ["Heat loss", "Contamination spread", "Lighting problems", "Noise"], c: 1 },
    { q: "Safety protocols should be:", a: ["Ignored", "Integrated into lab design", "Used only during emergencies", "Used only by managers"], c: 1 },
    { q: "Laboratories are commonly used in:", a: ["Hospitals", "Universities", "Industries", "All of the above"], c: 3 },
    { q: "Adaptable laboratory design helps with:", a: ["Future research changes", "Furniture decoration", "Music systems", "Lighting color"], c: 0 },
    { q: "Chemical waste disposal should be:", a: ["Random", "Controlled and managed", "Ignored", "Mixed with normal waste"], c: 1 },
    { q: "Biosafety cabinets help protect:", a: ["Researchers", "Samples", "Environment", "All of the above"], c: 3 },
    { q: "A well-designed laboratory primarily supports:", a: ["Safe and effective scientific work", "Entertainment", "Tourism", "Advertising"], c: 0 }
];

let questionQueue = []; 
let currentQuestion = null;
let totalQuestionsCount = 0;
let score = 0;
let wrongCount = 0;
let answeredCount = 0;

function startQuiz(count) {
    document.getElementById("setup-screen").style.display = "none";
    document.getElementById("game").style.display = "block";
    document.getElementById("stats-board").style.display = "grid";

    let shuffled = [...allQuestions].sort(() => Math.random() - 0.5);
    let maxQuestions = Math.min(count, allQuestions.length);
    
    questionQueue = shuffled.slice(0, maxQuestions);
    totalQuestionsCount = maxQuestions;
    
    score = 0;
    wrongCount = 0;
    answeredCount = 0;
    
    nextQuestion();
}

function updateStats() {
    let remaining = questionQueue.length + (currentQuestion ? 1 : 0);
    
    document.getElementById("val-ans").innerText = answeredCount;
    document.getElementById("val-rem").innerText = remaining;
    document.getElementById("val-cor").innerText = score;
    document.getElementById("val-wro").innerText = wrongCount;

    document.getElementById("btn-skip").disabled = (questionQueue.length === 0);
}

function nextQuestion() {
    if (questionQueue.length === 0) {
        showResults();
        return;
    }

    currentQuestion = questionQueue.shift();
    updateStats();

    document.getElementById("question").innerText = currentQuestion.q;
    const optionsBox = document.getElementById("options");
    optionsBox.innerHTML = "";
    
    currentQuestion.a.forEach((option, index) => {
        const btn = document.createElement("button");
        btn.innerText = option;
        btn.classList.add("option-btn");
        btn.onclick = () => checkAnswer(index, btn);
        optionsBox.appendChild(btn);
    });
    
    document.getElementById("skip-container").style.display = "block";
}

function checkAnswer(selected, btn) {
    document.getElementById("skip-container").style.display = "none"; 
    const allBtns = document.querySelectorAll(".option-btn");
    allBtns.forEach(b => b.disabled = true);
    
    if (selected === currentQuestion.c) {
        btn.classList.add("correct");
        score++;
    } else {
        btn.classList.add("incorrect");
        allBtns[currentQuestion.c].classList.add("correct");
        wrongCount++;
    }
    
    answeredCount++;
    currentQuestion = null; 
    updateStats();

    setTimeout(() => {
        nextQuestion();
    }, 1500);
}

function skipQuestion() {
    questionQueue.push(currentQuestion);
    currentQuestion = null;
    nextQuestion();
}

function showResults() {
    document.getElementById("game").style.display = "none";
    document.getElementById("stats-board").style.display = "none";
    document.getElementById("result-screen").style.display = "block";
    
    const percent = Math.round((score / totalQuestionsCount) * 100);
    document.getElementById("final-score").innerText = percent + "%";
    document.getElementById("score-text").innerText = `أحسنت! لقد أجبت بشكل صحيح على ${score} من أصل ${totalQuestionsCount} سؤال.`;
}
</script>

</body>
</html>
