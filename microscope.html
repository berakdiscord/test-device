<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>اختبار المجهر - (ترتيب عشوائي)</title>
    <style>
        :root { 
            --primary: #9b59b6; 
            --bg: #121212; 
            --container-bg: #1e1e1e; 
            --text-main: #e0e0e0; 
            --text-sec: #b3b3b3;
            --border-color: #333333;
            --btn-bg: #2a2a2a;
            --wrong: #e74c3c; 
            --right: #2ecc71; 
            --warning: #f39c12; 
        }
        
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: var(--bg); color: var(--text-main); margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .quiz-container { background: var(--container-bg); width: 100%; max-width: 700px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); padding: 30px; position: relative; overflow: hidden; border: 1px solid #2a2a2a; }
        
        .header { border-bottom: 2px solid var(--border-color); padding-bottom: 15px; margin-bottom: 20px; display: flex; justify-content: center; align-items: center; text-align: center; }
        .header h1 { font-size: 1.6rem; color: var(--primary); margin: 0; }
        
        .setup-screen { text-align: center; padding: 20px 0; }
        .setup-screen h2 { color: var(--text-main); margin-bottom: 10px; font-weight: normal; }
        .setup-screen p { color: var(--text-sec); margin-bottom: 25px; font-size: 1rem; }
        
        .setup-btns { display: flex; flex-direction: column; gap: 15px; max-width: 300px; margin: 0 auto; }
        
        .custom-input { background: var(--btn-bg); border: 2px solid var(--border-color); color: var(--text-main); padding: 15px; border-radius: 10px; font-size: 1.3rem; text-align: center; outline: none; transition: 0.3s; width: 100%; box-sizing: border-box; font-weight: bold; }
        .custom-input:focus { border-color: var(--primary); box-shadow: 0 0 15px rgba(155, 89, 182, 0.2); }

        .btn-setup { background: var(--primary); border: none; color: #fff; padding: 15px; border-radius: 10px; cursor: pointer; font-size: 1.1rem; font-weight: bold; transition: 0.3s; }
        .btn-setup:hover { background: #8e44ad; transform: translateY(-3px); box-shadow: 0 5px 15px rgba(155, 89, 182, 0.4); }

        .stats-board { display: none; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 25px; text-align: center; }
        .stat-box { background: var(--btn-bg); padding: 10px 5px; border-radius: 8px; font-weight: bold; font-size: 0.9rem; border: 1px solid var(--border-color); }
        .stat-cor { border-bottom: 3px solid var(--right); color: var(--right); }
        .stat-wro { border-bottom: 3px solid var(--wrong); color: var(--wrong); }
        .stat-rem { border-bottom: 3px solid var(--warning); color: var(--warning); }
        .stat-ans { border-bottom: 3px solid var(--primary); color: var(--primary); }
        .stat-box span { display: block; font-size: 1.4rem; margin-top: 5px; color: var(--text-main); }

        .question-text { font-size: 1.2rem; color: var(--text-main); margin-bottom: 25px; line-height: 1.6; font-weight: 600; text-align: left; direction: ltr; }
        .options-container { display: grid; gap: 12px; }
        .option-btn { background: var(--btn-bg); border: 2px solid var(--border-color); color: var(--text-main); padding: 15px; border-radius: 10px; cursor: pointer; text-align: left; font-size: 1rem; transition: all 0.2s; direction: ltr; }
        .option-btn:hover:not(:disabled) { border-color: var(--primary); background: #2c1e33; }
        .option-btn.correct { background-color: rgba(46, 204, 113, 0.2); border-color: var(--right); color: var(--right); }
        .option-btn.incorrect { background-color: rgba(231, 76, 60, 0.2); border-color: var(--wrong); color: var(--wrong); }
        
        .skip-container { margin-top: 20px; text-align: center; }
        .btn-skip { background: transparent; border: 1px solid var(--warning); color: var(--warning); padding: 12px 25px; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 1rem; transition: 0.3s; width: 100%; }
        .btn-skip:hover:not(:disabled) { background: rgba(243, 156, 18, 0.1); }
        .btn-skip:disabled { border-color: #555; color: #555; cursor: not-allowed; }

        .footer { margin-top: 30px; display: flex; justify-content: center; border-top: 2px solid var(--border-color); padding-top: 20px;}
        .btn { padding: 10px 25px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-home { background: #333; color: var(--text-main); text-decoration: none; font-size: 0.9rem; padding: 10px 20px; display: inline-block; border-radius: 8px; transition: 0.3s; border: 1px solid #444; }
        .btn-home:hover { background: #444; color: #fff; }
        
        .result-screen { text-align: center; display: none; }
        .score { font-size: 3.5rem; font-weight: bold; color: var(--primary); margin: 20px 0; text-shadow: 0 0 10px rgba(155, 89, 182, 0.3); }
        #score-text { color: var(--text-sec); font-size: 1.1rem; }
        
        #game { display: none; }

        @media (max-width: 500px) {
            .stats-board { grid-template-columns: repeat(2, 1fr); gap: 15px; }
        }
    </style>
</head>
<body>

<div class="quiz-container" id="quiz-box">
    <div class="header">
        <h1>Microscope Quiz</h1>
    </div>

    <div class="setup-screen" id="setup-screen">
        <h2>كم عدد الأسئلة التي تريد الإجابة عليها؟</h2>
        <p>الأسئلة المتاحة في بنك الأسئلة: <span id="max-q-count" style="color: var(--primary); font-weight: bold;">0</span> سؤال</p>
        
        <div class="setup-btns">
            <input type="number" id="custom-count" class="custom-input" min="1" placeholder="مثال: 50" value="25">
            <button class="btn-setup" onclick="startCustomQuiz()">🚀 ابدأ الاختبار</button>
            <p id="error-msg" style="color: var(--wrong); display: none; margin-top: 5px; font-weight: bold; font-size: 0.9rem;"></p>
        </div>
    </div>

    <div class="stats-board" id="stats-board">
        <div class="stat-box stat-ans">مُجاب <span id="val-ans">0</span></div>
        <div class="stat-box stat-rem">متبقي <span id="val-rem">0</span></div>
        <div class="stat-box stat-cor">صح <span id="val-cor">0</span></div>
        <div class="stat-box stat-wro">خطأ <span id="val-wro">0</span></div>
    </div>

    <div id="game">
        <div class="question-text" id="question">جاري تحميل السؤال...</div>
        <div class="options-container" id="options"></div>
        <div class="skip-container" id="skip-container">
            <button class="btn-skip" id="btn-skip" onclick="skipQuestion()">تخطي السؤال (تأجيل)</button>
        </div>
    </div>

    <div class="result-screen" id="result-screen">
        <h2>اكتمل الاختبار!</h2>
        <div class="score" id="final-score">0%</div>
        <p id="score-text"></p>
        <button class="btn" style="background: var(--primary); color:#fff; margin-top: 20px; margin-bottom: 10px; font-size: 1.1rem; padding: 12px 30px;" onclick="location.reload()">إعادة الاختبار</button>
    </div>

    <div class="footer">
        <a href="index.html" class="btn-home">العودة للرئيسية</a>
    </div>
</div>

<script src="questions.js"></script>

<script>
// سحب أسئلة المجهر
const allQuestions = typeof microscopeQuestions !== 'undefined' ? microscopeQuestions : [];

let questionQueue = []; 
let currentQuestion = null;
let totalQuestionsCount = 0;
let score = 0;
let wrongCount = 0;
let answeredCount = 0;

document.addEventListener("DOMContentLoaded", () => {
    document.getElementById("max-q-count").innerText = allQuestions.length;
    document.getElementById("custom-count").max = allQuestions.length;
});

function startCustomQuiz() {
    let inputVal = document.getElementById("custom-count").value;
    let count = parseInt(inputVal);
    let errorMsg = document.getElementById("error-msg");

    if (isNaN(count) || count < 1) {
        errorMsg.innerText = "⚠️ يرجى إدخال رقم صحيح أكبر من 0";
        errorMsg.style.display = "block";
        return;
    }
    if (count > allQuestions.length) {
        errorMsg.innerText = `⚠️ أقصى عدد متاح هو ${allQuestions.length} سؤال فقط!`;
        errorMsg.style.display = "block";
        return;
    }

    errorMsg.style.display = "none";
    startQuiz(count);
}

function startQuiz(count) {
    document.getElementById("setup-screen").style.display = "none";
    document.getElementById("game").style.display = "block";
    document.getElementById("stats-board").style.display = "grid";

    let shuffled = [...allQuestions].sort(() => Math.random() - 0.5);
    questionQueue = shuffled.slice(0, count);
    totalQuestionsCount = count;
    
    score = 0;
    wrongCount = 0;
    answeredCount = 0;
    
    nextQuestion();
}

function updateStats() {
    let remaining = questionQueue.length + (currentQuestion ? 1 : 0);
    document.getElementById("val-ans").innerText = answeredCount;
    document.getElementById("val-rem").innerText = remaining;
    document.getElementById("val-cor").innerText = score;
    document.getElementById("val-wro").innerText = wrongCount;
    document.getElementById("btn-skip").disabled = (questionQueue.length === 0);
}

function nextQuestion() {
    if (questionQueue.length === 0) {
        showResults();
        return;
    }

    currentQuestion = questionQueue.shift();
    updateStats();

    document.getElementById("question").innerText = currentQuestion.q;
    const optionsBox = document.getElementById("options");
    optionsBox.innerHTML = "";
    
    let shuffledOptions = currentQuestion.a.map((option, index) => {
        return { text: option, isCorrect: (index === currentQuestion.c) };
    });
    
    shuffledOptions.sort(() => Math.random() - 0.5); 

    shuffledOptions.forEach((opt) => {
        const btn = document.createElement("button");
        btn.innerText = opt.text;
        btn.classList.add("option-btn");
        btn.dataset.correct = opt.isCorrect; 
        btn.onclick = () => checkAnswer(opt.isCorrect, btn);
        optionsBox.appendChild(btn);
    });
    
    document.getElementById("skip-container").style.display = "block";
}

function checkAnswer(isCorrect, btn) {
    document.getElementById("skip-container").style.display = "none"; 
    const allBtns = document.querySelectorAll(".option-btn");
    allBtns.forEach(b => b.disabled = true);
    
    if (isCorrect) {
        btn.classList.add("correct");
        score++;
    } else {
        btn.classList.add("incorrect");
        wrongCount++;
        allBtns.forEach(b => {
            if (b.dataset.correct === "true") {
                b.classList.add("correct");
            }
        });
    }
    
    answeredCount++;
    currentQuestion = null; 
    updateStats();

    setTimeout(() => {
        nextQuestion();
    }, 1500);
}

function skipQuestion() {
    questionQueue.push(currentQuestion);
    currentQuestion = null;
    nextQuestion();
}

function showResults() {
    document.getElementById("game").style.display = "none";
    document.getElementById("stats-board").style.display = "none";
    document.getElementById("result-screen").style.display = "block";
    
    const percent = Math.round((score / totalQuestionsCount) * 100);
    document.getElementById("final-score").innerText = percent + "%";
    document.getElementById("score-text").innerText = `أحسنت! لقد أجبت بشكل صحيح على ${score} من أصل ${totalQuestionsCount} سؤال.`;
}
</script>

</body>
</html>
