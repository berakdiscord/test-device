<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>اختبار جهاز التقطير - مخصص</title>
    <style>
        :root { 
            --primary: #1abc9c; /* اللون الأخضر المميز لجهاز التقطير */
            --bg: #121212; 
            --container-bg: #1e1e1e; 
            --text-main: #e0e0e0; 
            --text-sec: #b3b3b3;
            --border-color: #333333;
            --btn-bg: #2a2a2a;
            --wrong: #e74c3c; 
            --right: #2ecc71; 
            --warning: #f39c12; 
        }
        
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: var(--bg); color: var(--text-main); margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .quiz-container { background: var(--container-bg); width: 100%; max-width: 700px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); padding: 30px; position: relative; overflow: hidden; border: 1px solid #2a2a2a; }
        
        .header { border-bottom: 2px solid var(--border-color); padding-bottom: 15px; margin-bottom: 20px; display: flex; justify-content: center; align-items: center; text-align: center; }
        .header h1 { font-size: 1.6rem; color: var(--primary); margin: 0; }
        
        /* شاشة إعداد الاختبار */
        .setup-screen { text-align: center; padding: 20px 0; }
        .setup-screen h2 { color: var(--text-main); margin-bottom: 10px; font-weight: normal; }
        .setup-screen p { color: var(--text-sec); margin-bottom: 25px; font-size: 1rem; }
        
        .setup-btns { display: flex; flex-direction: column; gap: 15px; max-width: 300px; margin: 0 auto; }
        
        /* تصميم مربع الإدخال */
        .custom-input {
            background: var(--btn-bg);
            border: 2px solid var(--border-color);
            color: var(--text-main);
            padding: 15px;
            border-radius: 10px;
            font-size: 1.3rem;
            text-align: center;
            outline: none;
            transition: 0.3s;
            width: 100%;
            box-sizing: border-box;
            font-weight: bold;
        }
        .custom-input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 15px rgba(26, 188, 156, 0.2);
        }

        .btn-setup { background: var(--primary); border: none; color: #fff; padding: 15px; border-radius: 10px; cursor: pointer; font-size: 1.1rem; font-weight: bold; transition: 0.3s; }
        .btn-setup:hover { background: #16a085; transform: translateY(-3px); box-shadow: 0 5px 15px rgba(26, 188, 156, 0.4); }

        .stats-board { display: none; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 25px; text-align: center; }
        .stat-box { background: var(--btn-bg); padding: 10px 5px; border-radius: 8px; font-weight: bold; font-size: 0.9rem; border: 1px solid var(--border-color); }
        .stat-cor { border-bottom: 3px solid var(--right); color: var(--right); }
        .stat-wro { border-bottom: 3px solid var(--wrong); color: var(--wrong); }
        .stat-rem { border-bottom: 3px solid var(--warning); color: var(--warning); }
        .stat-ans { border-bottom: 3px solid var(--primary); color: var(--primary); }
        .stat-box span { display: block; font-size: 1.4rem; margin-top: 5px; color: var(--text-main); }

        .question-text { font-size: 1.2rem; color: var(--text-main); margin-bottom: 25px; line-height: 1.6; font-weight: 600; text-align: left; direction: ltr; }
        .options-container { display: grid; gap: 12px; }
        .option-btn { background: var(--btn-bg); border: 2px solid var(--border-color); color: var(--text-main); padding: 15px; border-radius: 10px; cursor: pointer; text-align: left; font-size: 1rem; transition: all 0.2s; direction: ltr; }
        .option-btn:hover:not(:disabled) { border-color: var(--primary); background: #182a26; }
        .option-btn.correct { background-color: rgba(46, 204, 113, 0.2); border-color: var(--right); color: var(--right); }
        .option-btn.incorrect { background-color: rgba(231, 76, 60, 0.2); border-color: var(--wrong); color: var(--wrong); }
        
        .skip-container { margin-top: 20px; text-align: center; }
        .btn-skip { background: transparent; border: 1px solid var(--warning); color: var(--warning); padding: 12px 25px; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 1rem; transition: 0.3s; width: 100%; }
        .btn-skip:hover:not(:disabled) { background: rgba(243, 156, 18, 0.1); }
        .btn-skip:disabled { border-color: #555; color: #555; cursor: not-allowed; }

        .footer { margin-top: 30px; display: flex; justify-content: center; border-top: 2px solid var(--border-color); padding-top: 20px;}
        .btn { padding: 10px 25px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-home { background: #333; color: var(--text-main); text-decoration: none; font-size: 0.9rem; padding: 10px 20px; display: inline-block; border-radius: 8px; transition: 0.3s; border: 1px solid #444; }
        .btn-home:hover { background: #444; color: #fff; }
        
        .result-screen { text-align: center; display: none; }
        .score { font-size: 3.5rem; font-weight: bold; color: var(--primary); margin: 20px 0; text-shadow: 0 0 10px rgba(26, 188, 156, 0.3); }
        #score-text { color: var(--text-sec); font-size: 1.1rem; }
        
        #game { display: none; }

        @media (max-width: 500px) {
            .stats-board { grid-template-columns: repeat(2, 1fr); gap: 15px; }
        }
    </style>
</head>
<body>

<div class="quiz-container" id="quiz-box">
    <div class="header">
        <h1>Water Distiller Quiz</h1>
    </div>

    <div class="setup-screen" id="setup-screen">
        <h2>كم عدد الأسئلة التي تريد الإجابة عليها؟</h2>
        <p>الأسئلة المتاحة في بنك الأسئلة: <span id="max-q-count" style="color: var(--primary); font-weight: bold;">0</span> سؤال</p>
        
        <div class="setup-btns">
            <input type="number" id="custom-count" class="custom-input" min="1" placeholder="مثال: 50" value="25">
            
            <button class="btn-setup" onclick="startCustomQuiz()">🚀 ابدأ الاختبار</button>
            
            <p id="error-msg" style="color: var(--wrong); display: none; margin-top: 5px; font-weight: bold; font-size: 0.9rem;"></p>
        </div>
    </div>

    <div class="stats-board" id="stats-board">
        <div class="stat-box stat-ans">مُجاب <span id="val-ans">0</span></div>
        <div class="stat-box stat-rem">متبقي <span id="val-rem">0</span></div>
        <div class="stat-box stat-cor">صح <span id="val-cor">0</span></div>
        <div class="stat-box stat-wro">خطأ <span id="val-wro">0</span></div>
    </div>

    <div id="game">
        <div class="question-text" id="question">جاري تحميل السؤال...</div>
        <div class="options-container" id="options">
            </div>
        <div class="skip-container" id="skip-container">
            <button class="btn-skip" id="btn-skip" onclick="skipQuestion()">تخطي السؤال (تأجيل)</button>
        </div>
    </div>

    <div class="result-screen" id="result-screen">
        <h2>اكتمل الاختبار!</h2>
        <div class="score" id="final-score">0%</div>
        <p id="score-text"></p>
        <button class="btn" style="background: var(--primary); color:#121212; margin-top: 20px; margin-bottom: 10px; font-size: 1.1rem; padding: 12px 30px;" onclick="location.reload()">إعادة الاختبار</button>
    </div>

    <div class="footer">
        <a href="index.html" class="btn-home">العودة للرئيسية</a>
    </div>
</div>

<script>
// بنك أسئلة جهاز التقطير (70 سؤال)
const allQuestions = [
    { q: "What is the main purpose of distillation?", a: ["To separate mixtures based on solubility", "To separate liquids based on boiling points", "To chemically react two substances", "To create a solid from a liquid"], c: 1 },
    { q: "Which of the following is NOT a factor affecting successful distillation?", a: ["Difference in boiling points", "Vapour pressure differences", "Type of apparatus used", "Colour of the liquid"], c: 3 },
    { q: "In a distillation process, the component with a lower boiling point will:", a: ["Evaporate first", "Remain in the boiling flask", "Solidify", "React chemically with other components"], c: 0 },
    { q: "Which part of the water distiller is responsible for heating the water?", a: ["Condenser", "Immersion resistors", "Filter", "Control valve"], c: 1 },
    { q: "What is the function of the condenser in a distillation apparatus?", a: ["To heat the liquid", "To convert vapour back to liquid", "To store distilled water", "To filter impurities"], c: 1 },
    { q: "Which type of distillation uses a fractionating column?", a: ["Simple distillation", "Vacuum distillation", "Fractional distillation", "Steam distillation"], c: 2 },
    { q: "What is the primary advantage of fractional distillation over simple distillation?", a: ["It is faster", "It consumes less energy", "It provides better separation of liquids", "It works only for pure liquids"], c: 2 },
    { q: "What is the role of the activated carbon filter in a distiller?", a: ["To cool the vapour", "To remove impurities and odours", "To heat the water", "To increase pressure inside the distiller"], c: 1 },
    { q: "Which of the following is NOT a disadvantage of fractional distillation?", a: ["It consumes more energy", "It takes longer to complete", "It requires a more complex setup", "It only works for solid-liquid mixtures"], c: 3 },
    { q: "What is the main function of the vapour generator in a distillation system?", a: ["To cool the vapour", "To store distilled water", "To provide heat for boiling water", "To filter impurities"], c: 2 },
    { q: "Why is a thermometer used in a distillation setup?", a: ["To measure the boiling point of the liquid", "To cool the condenser", "To increase the pressure", "To change the chemical composition of the liquid"], c: 0 },
    { q: "What type of liquid is collected in the receiving flask in a distillation setup?", a: ["The liquid with the highest boiling point", "The liquid with the lowest boiling point", "The solid impurities", "The original mixture"], c: 1 },
    { q: "What happens to the vapour pressure of a liquid as temperature increases?", a: ["It decreases", "It remains the same", "It increases", "It fluctuates randomly"], c: 2 },
    { q: "What is the function of a control valve in a water distillation system?", a: ["To regulate the flow of water into the vapour generator", "To condense vapour into liquid", "To remove solid impurities", "To heat the liquid"], c: 0 },
    { q: "What type of container should be used to store distilled water?", a: ["Metal containers", "Special plastic containers", "Glass containers only", "Any available container"], c: 1 },
    { q: "Why does fractional distillation provide better separation of liquids than simple distillation?", a: ["It uses lower temperatures", "It includes a fractionating column for multiple condensation cycles", "It is performed under vacuum", "It adds impurities to the liquid"], c: 1 },
    { q: "Which component helps regulate the quantity of water inside the vapour generator?", a: ["Filter", "Water level device", "Control valve", "Condenser"], c: 1 },
    { q: "Which type of distillation is best for separating complex mixtures with small boiling point differences?", a: ["Simple distillation", "Fractional distillation", "Vacuum distillation", "Steam distillation"], c: 1 },
    { q: "What happens to the more volatile liquid in a distillation process?", a: ["It solidifies", "It evaporates first", "It remains in the boiling flask", "It mixes with impurities"], c: 1 },
    { q: "Why is cooling water constantly passed through the condenser?", a: ["To maintain low pressure", "To increase boiling point", "To convert vapour back into liquid", "To remove impurities"], c: 2 },
    { q: "What does a hydraulic connection do in a water distillation system?", a: ["It filters out contaminants", "It supplies water to the vapour generator", "It controls boiling temperature", "It collects distilled water"], c: 1 },
    { q: "Which of the following is NOT a benefit of simple distillation?", a: ["Simpler setup", "Faster process", "Better separation of components", "Lower energy consumption"], c: 2 },
    { q: "In fractional distillation, what do the glass beads in the fractionating column do?", a: ["Absorb impurities", "Increase condensation and re-evaporation", "Act as a filter", "Provide heat to the mixture"], c: 1 },
    { q: "What is the main difference between simple and fractional distillation?", a: ["Fractional distillation has a fractionating column", "Simple distillation is more energy-intensive", "Simple distillation provides better separation", "Fractional distillation is only used for solids"], c: 0 },
    { q: "What is the final product of the distillation process?", a: ["Impure water", "Distilled water", "Vapour", "Solids"], c: 1 },
    { q: "Distillation is a process of:", a: ["Filtration", "Separation by heating and condensation", "Freezing", "Grinding"], c: 1 },
    { q: "Successful distillation mainly depends on:", a: ["Color", "Density", "Difference in boiling points", "Volume"], c: 2 },
    { q: "The more volatile liquid is the one that:", a: ["Has a higher boiling point", "Has a lower boiling point", "Has higher density", "Has lighter color"], c: 1 },
    { q: "Distillation is mainly used for:", a: ["Purifying liquids", "Measuring pressure", "Dissolving salts", "Sterilizing tools"], c: 0 },
    { q: "The boiling point of a pure liquid is:", a: ["Variable", "Constant", "Always low", "Unknown"], c: 1 },
    { q: "The device that cools vapor is called:", a: ["Flask", "Column", "Condenser", "Valve"], c: 2 },
    { q: "In simple distillation, the boiling point difference should be:", a: ["Very small", "Less than 10°C", "Greater than 70°C", "Zero"], c: 2 },
    { q: "The fractionating column is used in:", a: ["Simple distillation", "Fractional distillation", "Filtration", "Evaporation only"], c: 1 },
    { q: "The function of immersion resistors is:", a: ["Cooling", "Heating", "Measuring", "Filtering"], c: 1 },
    { q: "Distilled water should be stored in:", a: ["Metal containers", "Open glass containers", "Special plastic containers", "Wooden containers"], c: 2 },
    { q: "Vapor changes into liquid during:", a: ["Evaporation", "Condensation", "Melting", "Freezing"], c: 1 },
    { q: "Better separation of close boiling liquids is achieved by:", a: ["Simple distillation", "Fractional distillation", "Filtration", "Evaporation"], c: 1 },
    { q: "Glass beads in the column increase:", a: ["Color", "Pressure", "Separation efficiency", "Volume"], c: 2 },
    { q: "Simple distillation is characterized by being:", a: ["Complex", "Energy consuming", "Faster", "Always more accurate"], c: 2 },
    { q: "One disadvantage of fractional distillation is:", a: ["Poor separation", "Faster process", "Higher energy consumption", "No column required"], c: 2 },
    { q: "Water in the boiling tank turns into vapor when:", a: ["Temperature decreases", "It reaches its boiling point", "Pressure is zero", "It freezes"], c: 1 },
    { q: "The function of the control valve is to:", a: ["Cool", "Regulate water flow", "Measure temperature", "Filter"], c: 1 },
    { q: "Distillation depends on differences in:", a: ["Color", "Taste", "Vapor pressure", "Shape"], c: 2 },
    { q: "Fractional distillation includes a:", a: ["Condenser only", "Fractionating column", "Filter only", "Resistor only"], c: 1 },
    { q: "The activated carbon filter removes:", a: ["Heat", "Impurities and odors", "Pressure", "Vapor"], c: 1 },
    { q: "The part that holds water before heating is the:", a: ["Condenser", "Boiling tank", "Column", "Filter"], c: 1 },
    { q: "The less volatile liquid:", a: ["Boils first", "Boils at higher temperature", "Evaporates faster", "Does not evaporate"], c: 1 },
    { q: "Increasing the number of theoretical plates will:", a: ["Decrease separation", "Improve separation", "Stop distillation", "Reduce time"], c: 1 },
    { q: "Distillation is used in laboratories for:", a: ["Grinding", "Separation and purification", "Weight measurement", "Melting"], c: 1 },
    { q: "The main difference between the two types is the presence of:", a: ["Flask", "Condenser", "Fractionating column", "Valve"], c: 2 },
    { q: "Simple distillation is suitable for:", a: ["Complex mixtures", "Small boiling point difference", "Large boiling point difference", "Solid materials"], c: 2 },
    { q: "Cooling water flows inside the:", a: ["Column", "Condenser", "Tank", "Filter"], c: 1 },
    { q: "Higher energy consumption in fractional distillation is due to:", a: ["Cooling", "Repeated evaporation", "Filtration", "Lower temperature"], c: 1 },
    { q: "Boiling point depends on:", a: ["Pressure", "Color", "Shape", "Length"], c: 0 },
    { q: "The goal of distillation is to:", a: ["Change color", "Separate components", "Increase mass", "Reduce volume"], c: 1 },
    { q: "Distillation separates liquids based on:", a: ["Density", "Boiling point", "Color", "Mass"], c: 1 },
    { q: "A pure liquid boils at a:", a: ["Variable temperature", "Constant temperature", "Very low temperature", "Very high temperature"], c: 1 },
    { q: "Fractional distillation is best for:", a: ["Pure liquids only", "Complex mixtures", "Solid materials", "Gases"], c: 1 },
    { q: "Simple distillation has less:", a: ["Time", "Heat", "Separation efficiency", "All of the above"], c: 3 },
    { q: "When vapor cools, it undergoes:", a: ["Evaporation", "Condensation", "Melting", "Combustion"], c: 1 },
    { q: "The distilled water container must be:", a: ["Contaminated", "Open", "Special and insulated", "Metal"], c: 2 },
    { q: "The more complex apparatus is:", a: ["Simple distillation", "Fractional distillation", "Both", "None"], c: 1 },
    { q: "The type of distillation used depends on:", a: ["Color", "Boiling point difference", "Taste", "Shape"], c: 1 },
    { q: "When boiling point difference is large, we use:", a: ["Fractional", "Simple", "None", "Filtration"], c: 1 },
    { q: "Repeated condensation and evaporation occur in the:", a: ["Condenser", "Column", "Tank", "Filter"], c: 1 },
    { q: "Vapor pressure increases when:", a: ["Temperature decreases", "Temperature increases", "Temperature is constant", "Freezing occurs"], c: 1 },
    { q: "Simple distillation is not suitable for:", a: ["Large boiling difference", "Pure liquids", "Small boiling difference", "Solid impurities"], c: 2 },
    { q: "The column improves separation because it provides:", a: ["Cooling", "Additional condensation surfaces", "Direct heating", "Filtration"], c: 1 },
    { q: "Distilled water is used in:", a: ["Medical laboratory analysis", "Drinking only", "Cooking", "Fuel"], c: 0 },
    { q: "The main principle of distillation is:", a: ["Heating then condensation", "Freezing", "Grinding", "Mixing"], c: 0 },
    { q: "Distillation is most useful when components have different:", a: ["Pressure", "Boiling points", "Weights", "Densities"], c: 1 },
    { q: "Device which allows flow of water towards the generator to be regulated:", a: ["Control Valve", "Hydraulic connection", "Safety Valve", "Vapor Generator"], c: 0 },
    { q: "Distilled water must be stored in special plastic containers to avoid:", a: ["Oxidation", "Evaporation", "Inflammation", "Ionic contamination"], c: 3 },
    { q: "Distillation separating complex mixtures with smaller boiling differences:", a: ["Fractional", "Complex", "Simple", "Mixture"], c: 0 },
    { q: "Fractional distillation is essentially the same as simple EXCEPT for the:", a: ["Condenser", "Boiling flask", "Fractionating column", "Thermometer"], c: 2 }
];

let questionQueue = []; 
let currentQuestion = null;
let totalQuestionsCount = 0;
let score = 0;
let wrongCount = 0;
let answeredCount = 0;

// عرض عدد الأسئلة المتاحة تلقائياً عند تحميل الصفحة
document.addEventListener("DOMContentLoaded", () => {
    document.getElementById("max-q-count").innerText = allQuestions.length;
    document.getElementById("custom-count").max = allQuestions.length;
});

// دالة بدء الاختبار بالرقم المدخل
function startCustomQuiz() {
    let inputVal = document.getElementById("custom-count").value;
    let count = parseInt(inputVal);
    let errorMsg = document.getElementById("error-msg");

    // التحقق من صحة الرقم
    if (isNaN(count) || count < 1) {
        errorMsg.innerText = "⚠️ يرجى إدخال رقم صحيح أكبر من 0";
        errorMsg.style.display = "block";
        return;
    }
    if (count > allQuestions.length) {
        errorMsg.innerText = `⚠️ أقصى عدد متاح هو ${allQuestions.length} سؤال فقط!`;
        errorMsg.style.display = "block";
        return;
    }

    // إذا كان الرقم صحيحاً، ابدأ الاختبار
    errorMsg.style.display = "none";
    startQuiz(count);
}

function startQuiz(count) {
    document.getElementById("setup-screen").style.display = "none";
    document.getElementById("game").style.display = "block";
    document.getElementById("stats-board").style.display = "grid";

    let shuffled = [...allQuestions].sort(() => Math.random() - 0.5);
    questionQueue = shuffled.slice(0, count);
    totalQuestionsCount = count;
    
    score = 0;
    wrongCount = 0;
    answeredCount = 0;
    
    nextQuestion();
}

function updateStats() {
    let remaining = questionQueue.length + (currentQuestion ? 1 : 0);
    
    document.getElementById("val-ans").innerText = answeredCount;
    document.getElementById("val-rem").innerText = remaining;
    document.getElementById("val-cor").innerText = score;
    document.getElementById("val-wro").innerText = wrongCount;

    document.getElementById("btn-skip").disabled = (questionQueue.length === 0);
}

function nextQuestion() {
    if (questionQueue.length === 0) {
        showResults();
        return;
    }

    currentQuestion = questionQueue.shift();
    updateStats();

    document.getElementById("question").innerText = currentQuestion.q;
    const optionsBox = document.getElementById("options");
    optionsBox.innerHTML = "";
    
    // --- ميزة خلط الخيارات العشوائي (Shuffling) ---
    // نقوم بربط كل خيار بمعلومة (هل هو صحيح أم لا) قبل الخلط
    let shuffledOptions = currentQuestion.a.map((option, index) => {
        return { text: option, isCorrect: (index === currentQuestion.c) };
    });
    
    // خلط أماكن الخيارات عشوائياً
    shuffledOptions.sort(() => Math.random() - 0.5); 
    // ----------------------------------------------

    shuffledOptions.forEach((opt) => {
        const btn = document.createElement("button");
        btn.innerText = opt.text;
        btn.classList.add("option-btn");
        // نحفظ داخل الزر معلومة مخفية إذا كان هو الصح أم الخطأ
        btn.dataset.correct = opt.isCorrect; 
        
        btn.onclick = () => checkAnswer(opt.isCorrect, btn);
        optionsBox.appendChild(btn);
    });
    
    document.getElementById("skip-container").style.display = "block";
}

function checkAnswer(isCorrect, btn) {
    document.getElementById("skip-container").style.display = "none"; 
    const allBtns = document.querySelectorAll(".option-btn");
    allBtns.forEach(b => b.disabled = true);
    
    if (isCorrect) {
        // إذا كانت الإجابة صحيحة
        btn.classList.add("correct");
        score++;
    } else {
        // إذا كانت خاطئة
        btn.classList.add("incorrect");
        wrongCount++;
        // يبحث النظام عن الزر الصحيح (الذي تم تغيير مكانه) ويلونه بالأخضر
        allBtns.forEach(b => {
            if (b.dataset.correct === "true") {
                b.classList.add("correct");
            }
        });
    }
    
    answeredCount++;
    currentQuestion = null; 
    updateStats();

    setTimeout(() => {
        nextQuestion();
    }, 1500);
}

function skipQuestion() {
    questionQueue.push(currentQuestion);
    currentQuestion = null;
    nextQuestion();
}

function showResults() {
    document.getElementById("game").style.display = "none";
    document.getElementById("stats-board").style.display = "none";
    document.getElementById("result-screen").style.display = "block";
    
    const percent = Math.round((score / totalQuestionsCount) * 100);
    document.getElementById("final-score").innerText = percent + "%";
    document.getElementById("score-text").innerText = `أحسنت! لقد أجبت بشكل صحيح على ${score} من أصل ${totalQuestionsCount} سؤال.`;
}
</script>

</body>
</html>
